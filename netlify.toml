[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  # Cheerio 1.x (used by the IFA parser in sync-matches) references the
  # global `File` Web API, which Node 18 doesn't expose. Node 20 does.
  NODE_VERSION = "20"

# Netlify Functions — host the daily alert sender that replaces the old
# Apps Script. Schedule is declared in the function via the @netlify/functions
# `schedule()` wrapper.
[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
